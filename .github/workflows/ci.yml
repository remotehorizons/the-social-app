name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"

jobs:
  mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --runInBand

  rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-rs

      - name: Run tests
        run: cargo test
